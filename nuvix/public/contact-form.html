<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Form Registration</title>
</head>
<body>
  <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="text" name="name" />
    <input type="email" name="email" />
    <textarea name="objective"></textarea>
    <input type="radio" name="timeline" value="asap" />
    <input type="radio" name="timeline" value="1-3-months" />
    <input type="radio" name="timeline" value="flexible" />
    <input type="hidden" name="bot-field" />
  </form>
</body>
</html>
