# Plain HTTP on port 80 - Shared with other domains via server_name
server {
    listen 80;
    server_name esriofficial.online www.esriofficial.online;

    root /var/www/esriofficial.online;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Add caching for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}

# Plain HTTP on port 2052 - Dedicated Cloudflare Origin Port
server {
    listen 2052;
    server_name esriofficial.online www.esriofficial.online;

    root /var/www/esriofficial.online;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|mp4)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
