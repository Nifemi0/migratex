server {
    listen 80;
    server_name yourdomain.com; # Replace with your actual domain or IP

    root /var/www/html; # Replace with your actual dist folder path
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optimization: Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Security: Disable access to hidden files (.env, .git)
    location ~ /\. {
        deny all;
    }
}
